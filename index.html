  <script src="assets/bg/js/ascii-effect.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      try {
        const container = document.getElementById('ascii-canvas-container');
        if (container && window.initAsciiEffect && window.THREE) {
          // Wait until Space Mono and Montserrat/KCY2KBanger-Bold fonts are loaded
          Promise.all([
            document.fonts.load('12px "Space Mono"'),
            document.fonts.load('bold 12px "Space Mono"'),
            document.fonts.load('12px "Montserrat"'),
            document.fonts.load('bold 12px "Montserrat"'),
            document.fonts.load('bold 12px "KCY2KBanger-Bold"')
          ]).then(() => {
            const isMobile = window.innerWidth < 768;
            const heroText = isMobile ? 'R\nW' : 'ROBIN\nWATTIER';
            const fontSize = isMobile ? 480 : 250;
            const lHeight = isMobile ? 0.75 : 1.0;

            window.initAsciiEffect(container, {
              text: heroText,
              asciiFontSize: 10,
              textFontSize: fontSize,
              lineHeight: lHeight,
              fontFamily: isMobile ? 'KCY2KBanger-Bold' : 'Montserrat',
              textColor: '#ffffff',
              enableWaves: true,
              planeBaseHeight: isMobile ? 16 : 12
            });
          }).catch(() => { /* fonts failed to load — skip ASCII */ });
        }
      } catch (e) {
        // THREE.js not available (offline / file:// CORS) — skip ASCII bg gracefully
        console.warn('ASCII background skipped:', e.message);
      }
    });
  </script>
