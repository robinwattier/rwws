<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robin Wattier</title>
    <meta name="description" content="Robin Wattier — Creative portfolio exploring AI, Audio, and Visual experiences.">

    <!-- Fonts: Local Montserrat and KCY2KBanger-Bold -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/logo-rw-verical-version-fiv-icon.png">

    <script src="js/script.js" defer></script>
</head>

<body>

    <!-- Global Background -->
    <div id="site-bg">
        <div id="ascii-canvas-container" class="ascii-text-container" style="width: 100%; height: 100%; position: absolute;"></div>
    </div>

    <!-- Navbar -->
    <header id="navbar">
        <div class="nav-left">
            <button id="burger-menu" aria-label="Menu" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="8" x2="21" y2="8"></line>
                    <line x1="3" y1="16" x2="21" y2="16"></line>
                </svg>
            </button>
        </div>
        <div class="nav-center">
            <a href="#hero" class="nav-logo-text" aria-label="Home">RW</a>
        </div>
        <div class="nav-right"></div>
    </header>

    <!-- Fullscreen Menu Overlay -->
    <div id="fullscreen-menu" class="overlay hidden">
        <div class="menu-content">
            <button id="close-menu" class="close-btn" aria-label="Close menu">&times;</button>
            


            <nav>
                <ul class="nav-links">
                    <li><a href="#work" class="menu-link">Work</a></li>
                    <li><a href="#contact/Follow" class="menu-link">Contact/<br class="mobile-only-br">Follow</a></li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <main>

        <!-- Hero / About Section -->
        <section id="hero">
            <div class="hero-content">
                <!-- Text and button removed for ASCII intro -->
            </div>


            <!-- Infinite Ticker -->
            <div class="marquee-section">
                <div class="marquee">
                    <div class="marquee-content">
                        <span>AI</span><span class="marquee-dot">•</span>
                        <span>AUDIO</span><span class="marquee-dot">•</span>
                        <span>VISUAL</span><span class="marquee-dot">•</span>
                        <span>AI</span><span class="marquee-dot">•</span>
                        <span>AUDIO</span><span class="marquee-dot">•</span>
                        <span>VISUAL</span><span class="marquee-dot">•</span>
                        <span>AI</span><span class="marquee-dot">•</span>
                        <span>AUDIO</span><span class="marquee-dot">•</span>
                        <span>VISUAL</span><span class="marquee-dot">•</span>
                        <span>AI</span><span class="marquee-dot">•</span>
                        <span>AUDIO</span><span class="marquee-dot">•</span>
                        <span>VISUAL</span><span class="marquee-dot">•</span>
                    </div>
                    <!-- Duplicate for seamless loop -->
                    <div class="marquee-content" aria-hidden="true">
                        <span>AI</span><span class="marquee-dot">•</span>
                        <span>AUDIO</span><span class="marquee-dot">•</span>
                        <span>VISUAL</span><span class="marquee-dot">•</span>
                        <span>AI</span><span class="marquee-dot">•</span>
                        <span>AUDIO</span><span class="marquee-dot">•</span>
                        <span>VISUAL</span><span class="marquee-dot">•</span>
                        <span>AI</span><span class="marquee-dot">•</span>
                        <span>AUDIO</span><span class="marquee-dot">•</span>
                        <span>VISUAL</span><span class="marquee-dot">•</span>
                        <span>AI</span><span class="marquee-dot">•</span>
                        <span>AUDIO</span><span class="marquee-dot">•</span>
                        <span>VISUAL</span><span class="marquee-dot">•</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Work Section -->
        <section id="work" class="section">
            <div class="section-container work-full-width">
                <h2 class="section-title">Work</h2>
                <div class="work-grid" id="projects-container">
                    <!-- Cards injected by JavaScript -->
                </div>
            </div>
        </section>

        <!-- Project Lightbox Modal -->
        <div id="project-modal" class="modal hidden">
            <button class="close-modal" aria-label="Close modal">&times;</button>
            <div class="modal-content project-modal-content glass-panel">
                <div id="project-details">
                    <!-- Injected by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Contact / Follow Section -->
        <section id="contact/Follow" class="section">
            <div class="section-container">
                <h2 class="section-title">Contact/<br class="mobile-only-br">Follow</h2>
                <div class="contact-body">
                    <a href="https://linktr.ee/robinwattier" target="_blank" rel="noopener noreferrer" class="contact-linktree-icon" aria-label="Linktree">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="60" height="60" fill="currentColor"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M112 237.4L237.8 237.4L148.4 152L197.9 101L283.1 188.8L283.1 64L357 64L357 188.8L442.2 101.2L491.6 152L402.2 237.2L527.9 237.2L527.9 307.7L401.5 307.7L491.5 395.3L442.2 445.1L320 322.1L197.8 445.1L148.3 395.5L238.3 307.9L111.9 307.9L111.9 237.4zM282.9 408.8L356.8 408.8L356.8 576L282.9 576L282.9 408.8z"/></svg>
                    </a>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p class="copyright">&copy; Robin Wattier. Built with passion and AI.</p>
        </div>
    </footer>

    <div id="toast" class="toast-notification"></div>

    <script src="js/ascii-effect.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('ascii-canvas-container');
            if (container && window.initAsciiEffect) {
                // Ensure fonts are loaded before initializing the 3D text
                document.fonts.ready.then(() => {
                    const isMobile = window.innerWidth < 768;
                    const heroText = isMobile ? 'R\nW' : 'ROBIN\nWATTIER';
                    const fontSize = isMobile ? 480 : 250;
                    const lHeight = isMobile ? 0.75 : 1.0;

                    window.initAsciiEffect(container, {
                        text: heroText,
                        asciiFontSize: 10,
                        textFontSize: fontSize,
                        lineHeight: lHeight,
                        fontFamily: isMobile ? 'KCY2KBanger-Bold' : 'Montserrat',
                        textColor: '#ffffff',
                        enableWaves: true,
                        planeBaseHeight: isMobile ? 16 : 12
                    });
                });
            }
        });
    </script>
</body>
</html>
